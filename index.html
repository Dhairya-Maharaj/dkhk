<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VR Chemistry Lab</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/super-hands@5.0.4/dist/super-hands.min.js"></script>

<script>

AFRAME.registerComponent('chemical-reaction', {

init:function(){

this.cooldown=false;

},

tick:function(){

if(this.cooldown) return;

const myType=this.el.getAttribute('data-type');

let myPos=new THREE.Vector3();
this.el.object3D.getWorldPosition(myPos);

let chemicals=document.querySelectorAll('.chemical');

for(let i=0;i<chemicals.length;i++){

let other=chemicals[i];

if(other===this.el) continue;

let otherPos=new THREE.Vector3();
other.object3D.getWorldPosition(otherPos);

let dist=myPos.distanceTo(otherPos);

if(dist<0.18){

const otherType=other.getAttribute('data-type');

if(
(myType==="acid" && otherType==="base") ||
(myType==="base" && otherType==="acid")
){

this.neutralize(other);

}

else if(
(myType==="sodium" && otherType==="water") ||
(myType==="water" && otherType==="sodium")
){

this.explode(other);

}

else if(
(myType==="magic") ||
(otherType==="magic")
){

this.rainbow(other);

}

}

}

},

neutralize:function(other){

this.cooldown=true;

let a=this.el.querySelector('.liquid');
let b=other.querySelector('.liquid');

if(a) a.setAttribute('color','#ffffff');
if(b) b.setAttribute('color','#ffffff');

setTimeout(()=>{
this.cooldown=false;
},1000);

},

rainbow:function(other){

this.cooldown=true;

let a=this.el.querySelector('.liquid');
let b=other.querySelector('.liquid');

if(a){

a.setAttribute(
'animation__color',
'property:material.color;dir:alternate;loop:true;dur:400;to:#ff00ff'
);

}

if(b){

b.setAttribute(
'animation__color',
'property:material.color;dir:alternate;loop:true;dur:400;to:#00ffff'
);

}

setTimeout(()=>{
this.cooldown=false;
},1000);

},

explode:function(other){

this.cooldown=true;

let blast=document.createElement('a-sphere');

blast.setAttribute(
'position',
this.el.getAttribute('position')
);

blast.setAttribute(
'radius',
'0.1'
);

blast.setAttribute(
'color',
'#ff5500'
);

blast.setAttribute(
'material',
'emissive:#ff0000;emissiveIntensity:1'
);

blast.setAttribute(
'animation__grow',
'property:scale;to:15 15 15;dur:400'
);

blast.setAttribute(
'animation__fade',
'property:material.opacity;to:0;dur:400'
);

this.el.sceneEl.appendChild(blast);

setTimeout(()=>{

if(blast.parentNode){
blast.parentNode.removeChild(blast);
}

},450);

if(other.parentNode){
other.parentNode.removeChild(other);
}

if(this.el.parentNode){
this.el.parentNode.removeChild(this.el);
}

}

});

AFRAME.registerComponent('spawn-chemicals',{

init:function(){

const chemicals=[

{
name:'Acid',
type:'acid',
color:'#32cd32'
},

{
name:'Base',
type:'base',
color:'#ff1493'
},

{
name:'Water',
type:'water',
color:'#00bfff'
},

{
name:'Sodium',
type:'sodium',
color:'#c0c0c0'
},

{
name:'Magic',
type:'magic',
color:'#8a2be2'
},

{
name:'Red Dye',
type:'red',
color:'#ff0000'
},

{
name:'Yellow Dye',
type:'yellow',
color:'#ffd700'
},

{
name:'Cyan Dye',
type:'cyan',
color:'#00ffff'
}

];

for(let i=0;i<chemicals.length;i++){

let chem=chemicals[i];

let beaker=document.createElement('a-entity');

beaker.setAttribute(
'position',
`${-2.5+(i*0.7)} 1.2 -3`
);

beaker.setAttribute(
'class',
'chemical'
);

beaker.setAttribute(
'data-type',
chem.type
);

beaker.setAttribute(
'grabbable',
''
);

beaker.setAttribute(
'dynamic-body',
'mass:0.2'
);

beaker.setAttribute(
'chemical-reaction',
''
);

let glass=document.createElement('a-cylinder');

glass.setAttribute('radius','0.12');
glass.setAttribute('height','0.3');
glass.setAttribute(
'material',
'color:white;opacity:0.3;transparent:true'
);

beaker.appendChild(glass);

let liquid=document.createElement('a-cylinder');

liquid.setAttribute(
'class',
'liquid'
);

liquid.setAttribute(
'position',
'0 -0.05 0'
);

liquid.setAttribute(
'radius',
'0.11'
);

liquid.setAttribute(
'height',
'0.2'
);

liquid.setAttribute(
'color',
chem.color
);

beaker.appendChild(liquid);

let text=document.createElement('a-text');

text.setAttribute(
'value',
chem.name
);

text.setAttribute(
'position',
'0 0.25 0'
);

text.setAttribute(
'align',
'center'
);

text.setAttribute(
'color',
'black'
);

text.setAttribute(
'scale',
'0.4 0.4 0.4'
);

beaker.appendChild(text);

this.el.sceneEl.appendChild(beaker);

}

}

});</script>
</head>

<body>

<a-scene
 physics="gravity:-9.8"
 renderer="antialias:true"
 spawn-chemicals>

    <!-- Floor -->

    <a-plane
        rotation="-90 0 0"
        width="20"
        height="20"
        color="#B0BEC5"
        static-body>
    </a-plane>

    <!-- Back Wall -->

    <a-plane
        position="0 3 -8"
        width="20"
        height="6"
        color="#d9f0ff">
    </a-plane>

    <!-- Left Wall -->

    <a-plane
        position="-10 3 0"
        rotation="0 90 0"
        width="16"
        height="6"
        color="#d9f0ff">
    </a-plane>

    <!-- Right Wall -->

    <a-plane
        position="10 3 0"
        rotation="0 -90 0"
        width="16"
        height="6"
        color="#d9f0ff">
    </a-plane>

    <!-- Lab Table -->

    <a-box
        position="0 0.5 -3"
        width="8"
        height="1"
        depth="2"
        color="#222222"
        static-body>
    </a-box>

    <!-- Lights -->

    <a-entity
        light="type:ambient;intensity:0.8">
    </a-entity>

    <a-entity
        light="type:point;
               intensity:1.2;
               distance:30"
        position="0 5 -2">
    </a-entity>

    <!-- Player Rig -->

    <a-entity id="rig" position="0 0 0">

        <a-camera position="0 1.6 0">
        </a-camera>

        <!-- LEFT HAND -->

        <a-entity
            hand-controls="hand:left"
            super-hands>
        </a-entity>

        <!-- RIGHT HAND -->

        <a-entity
            hand-controls="hand:right"
            super-hands>
        </a-entity>

    </a-entity>

</a-scene>

</body>
</html>
